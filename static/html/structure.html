<!-- ========================================
     My Agent - HTML Structure
     ======================================== -->

<button class="sidebar-toggle" onclick="toggleSidebar()">Menu</button>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewSession()">
                <span>+</span>
                <span>New Chat</span>
            </button>

            <div class="sidebar-tabs">
                <button class="sidebar-tab active" id="tabChat">Chat</button>
            </div>
        </div>

        <div class="sidebar-panel active" id="panelChat">
            <div class="session-list" id="sessionList"></div>
        </div>

        <div class="sidebar-footer">
            <div class="user-info">
                <span id="currentUser" class="username"></span>
                <button onclick="logout()" class="logout-btn">
                    <span class="logout-icon">Out</span>
                    <span>Log Out</span>
                </button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="chatView" class="content-view active">
            <div class="chat-header">
                <div class="header-left">
                    <h2 id="chatTitle">New Chat</h2>

                    <button class="mode-btn" onclick="toggleSubtaskPanel()" id="modeSubtask" style="display:none;">Subtasks</button>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">AI</div>
                    <h3 id="welcomeTitle">AI Assistant</h3>
                    <p id="welcomeDesc">Upload a PDF or image first, then ask the agent to analyze it by file path.</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        placeholder="Type a message... (Ctrl+Enter to send)"
                        rows="1"
                        oninput="autoResize(this)"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<div class="subtask-panel" id="subtaskPanel">
    <div class="subtask-panel-header">
        <h3>Subtask Details</h3>
        <button class="close-panel-btn" onclick="toggleSubtaskPanel()">Close</button>
    </div>
    <div id="subtaskList">
        <p style="color: #999; text-align: center; padding: 40px 0;">No subtasks yet</p>
    </div>
</div>
