<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Agent</title>
    
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- 样式文件 -->
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <!-- HTML 结构 -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewSession()">
                    <span>＋</span>
                    <span>新对话</span>
                </button>
            </div>
            
            <!-- 会话列表面板 -->
            <div class="sidebar-panel active" id="panelChat">
                <div class="session-list" id="sessionList">
                    <!-- 会话列表动态生成 -->
                </div>
            </div>
            
            <!-- 用户信息和退出按钮（左下角） -->
            <div class="sidebar-footer">
                <div class="user-info">
                    <span id="currentUser" class="username"></span>
                    <button onclick="logout()" class="logout-btn">
                        <span class="logout-icon">🚪</span>
                        <span>退出</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 对话界面 -->
            <div id="chatView" class="content-view active">
                <div class="chat-header">
                    <div class="header-left">
                        <!-- 子任务按钮（复杂任务完成后自动显示） -->
                        <button class="mode-btn" onclick="toggleSubtaskPanel()" id="modeSubtask" style="display:none;">
                            <span class="mode-icon">📋</span>子任务
                        </button>

                        <h2 id="chatTitle" style="display:none;"></h2>
                    </div>
                </div>

                <div class="chat-container" id="chatContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">🦌</div>
                        <h3 id="welcomeTitle">你好！我是你的 AI 助手</h3>
                        <p id="welcomeDesc">我可以帮你搜索信息、分析产业链、处理数据，复杂任务会自动启用智能分析</p>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea
                            id="messageInput"
                            placeholder="输入消息...（Ctrl+Enter 发送）"
                            rows="1"
                            oninput="autoResize(this)"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            发送
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 子任务面板 -->
    <div class="subtask-panel" id="subtaskPanel">
        <div class="subtask-panel-header">
            <h3>📋 子任务详情</h3>
            <button class="close-panel-btn" onclick="toggleSubtaskPanel()">×</button>
        </div>
        <div id="subtaskList">
            <p style="color: #999; text-align: center; padding: 40px 0;">暂无子任务</p>
        </div>
    </div>

    <!-- JavaScript 文件（按依赖顺序加载） -->
    <!-- 1. 工具函数（无依赖） -->
    <script src="static/js/utils.js"></script>
    <!-- 2. 对话功能（依赖 utils.js） -->
    <script src="static/js/chat.js"></script>
    <!-- 3. 消息处理（依赖 chat.js, utils.js） -->
    <script src="static/js/message.js"></script>
    <!-- 4. 主应用入口（依赖所有其他文件） -->
    <script src="static/js/app.js"></script>
</body>
</html>
