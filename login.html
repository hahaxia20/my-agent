<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - My Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 420px;
            max-width: 90%;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            margin: 0 40px;
            border-bottom: 2px solid #e5e5e5;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .auth-tab:hover:not(.active) {
            color: #666;
            background: #f5f5f5;
        }

        .auth-form {
            padding: 30px 40px 40px;
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #3c3;
        }

        .success-message.show {
            display: block;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e5e5e5;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .demo-hint {
            background: #f0f7ff;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .demo-hint strong {
            color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>🦌 My Agent</h1>
            <p>AI Agent 智能助手</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">登录</button>
            <button class="auth-tab" onclick="switchTab('register')">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="auth-form active">
            <div id="loginError" class="error-message"></div>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
            </div>

            <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
                登录
            </button>

            <div class="divider">或者</div>

            <div class="demo-hint">
                💡 <strong>演示模式</strong>：直接输入任意用户名即可登录
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="auth-form">
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="registerUsername" placeholder="输入用户名（至少3个字符）" autocomplete="username">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="registerPassword" placeholder="输入密码（至少6个字符）" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="registerConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
            </div>

            <button class="auth-btn" id="registerBtn" onclick="handleRegister()">
                注册
            </button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8001';

        // 切换标签
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');

            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }

            // 清除错误信息
            hideMessages();
        }

        // 隐藏所有消息
        function hideMessages() {
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.classList.remove('show');
            });
        }

        // 显示错误
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
        }

        // 显示成功
        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
        }

        // 处理登录
        async function handleLogin() {
            hideMessages();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username) {
                showError('loginError', '请输入用户名');
                return;
            }

            if (!password) {
                showError('loginError', '请输入密码');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>登录中...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // 保存 token 和用户信息
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('currentUser', data.username);

                    // 跳转到主界面
                    window.location.href = 'frontend.html';
                } else {
                    showError('loginError', data.detail || '登录失败');
                }
            } catch (error) {
                showError('loginError', '网络错误，请检查服务是否启动');
                console.error('登录错误:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        // 处理注册
        async function handleRegister() {
            hideMessages();

            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            if (!username || username.length < 3) {
                showError('registerError', '用户名至少3个字符');
                return;
            }

            if (!password || password.length < 6) {
                showError('registerError', '密码至少6个字符');
                return;
            }

            if (password !== confirmPassword) {
                showError('registerError', '两次输入的密码不一致');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>注册中...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                // 找到这段代码（handleRegister 函数中）
                if (data.success) {
                    showSuccess('registerSuccess', '注册成功！正在跳转到登录页...');

                    // 不要保存 token，直接跳转登录页
                    // localStorage.setItem('authToken', data.token);  // ← 删除或注释
                    // localStorage.setItem('currentUser', data.username);  // ← 删除或注释

                    // 2秒后跳转到登录页（不是 index.html）
                    setTimeout(() => {
                        // 清空表单
                        document.getElementById('registerUsername').value = '';
                        document.getElementById('registerPassword').value = '';
                        document.getElementById('registerConfirmPassword').value = '';

                        // 切换到登录 Tab
                        switchTab('login');

                        // 自动填充用户名
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').focus();

                        // 显示成功提示
                        showError('loginError', '');  // 清除错误
                        const loginSuccess = document.getElementById('loginError');
                        loginSuccess.textContent = '✅ 注册成功！请登录';
                        loginSuccess.style.background = '#efe';
                        loginSuccess.style.color = '#3c3';
                        loginSuccess.style.borderLeftColor = '#3c3';
                        loginSuccess.classList.add('show');
                    }, 1000);
                } else {
                    showError('registerError', data.detail || '注册失败');
                }
            } catch (error) {
                showError('registerError', '网络错误，请检查服务是否启动');
                console.error('注册错误:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }

        // 回车键提交
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        document.getElementById('registerConfirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRegister();
        });

        // 页面加载时检查是否已登录
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                // 已登录，直接跳转
                window.location.href = 'frontend.html';
            }
        });
    </script>
</body>
</html>
