<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - My Agent</title>
    
    <!-- 样式文件 -->
    <link rel="stylesheet" href="static/css/login.css">
</head>
<body>
    <!-- 登录容器 -->
    <div class="auth-container">
        <div class="auth-header">
            <h1>🦌 My Agent</h1>
            <p>AI Agent 智能助手</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">登录</button>
            <button class="auth-tab" onclick="switchTab('register')">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="auth-form active">
            <div id="loginError" class="error-message"></div>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
            </div>

            <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
                登录
            </button>

            <div class="divider">或者</div>

            <div class="demo-hint">
                💡 <strong>演示模式</strong>：直接输入任意用户名即可登录
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="auth-form">
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="registerUsername" placeholder="输入用户名（至少3个字符）" autocomplete="username">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="registerPassword" placeholder="输入密码（至少6个字符）" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="registerConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
            </div>

            <button class="auth-btn" id="registerBtn" onclick="handleRegister()">
                注册
            </button>
        </div>
    </div>

    <!-- JavaScript 文件 -->
    <script src="static/js/login.js"></script>
</body>
</html>
